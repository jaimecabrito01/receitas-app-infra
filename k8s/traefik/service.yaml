apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  type: NodePort
  ports:
    - name: web
      port: 80
      nodePort: 30080
      targetPort: web
    - name: websecure
      port: 443
      nodePort: 30443
      targetPort: websecure
    - name: argocd
      port: 9000
      nodePort: 30900
      targetPort: argocd
  selector:
    app: traefik
