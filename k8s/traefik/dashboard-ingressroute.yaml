apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: HostSNI(`*`) && PathPrefix(`/dashboard`)
      services:
        - name: api@internal
          kind: TraefikService
