apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: receitas-app-ingress
  namespace: receitas-app
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: PathPrefix(`/api`)
      middlewares:
        - name: strip-api
      services:
        - name: receitas-app-service
          port: 8080
    - kind: Rule
      match: PathPrefix(`/`)
      services:
        - name: receitas-app-frontend-service
          port: 80
