apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: receitas-backend
  namespace: receitas-app
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/api`)
      kind: Rule
      services:
        - name: receitas-app-service
          port: 8080
  middlewares:
  - name: strip-api
