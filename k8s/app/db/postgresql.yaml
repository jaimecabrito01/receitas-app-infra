apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: receitas-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi # Espaço para o banco
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: receitas-app
spec:
  serviceName: "postgres-service"
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine # Imagem leve e estável
        ports:
        - containerPort: 5432
          name: postgresdb
        env:
        - name: POSTGRES_DB
          value: "energia_db"       # Nome do banco de dados
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: username

        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: password
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
  volumeClaimTemplates: []
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: receitas-app
spec:
  type: ClusterIP # Fica isolado do mundo exterior, seguro dentro do cluster
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres
