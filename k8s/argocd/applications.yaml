apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: receitas-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jaimecabrito01/receitas-app-infra.git
    targetRevision: main
    path: k8s/app
  destination:
    server: https://kubernetes.default.svc
    namespace: receitas-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
